name: Publish CLI

permissions: {}

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish @elytro/agent-cli to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install deps (esbuild, for the prepublish build)
        run: npm install

      - name: Verify the release tag matches the package version
        if: github.event_name == 'release'
        run: |
          PKG=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#v}"
          echo "package=$PKG tag=$TAG"
          test "$PKG" = "$TAG" || { echo "::error::release tag ($TAG) != cli/package.json version ($PKG)"; exit 1; }

      - name: Publish to npm (with provenance)
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
